# Repository defaults for the tested reader. Optional revision and physical-bay
# guards default to any. Operational scripts also read
# /etc/framework-microsd-rootfs.conf when it exists. CLI options override
# environment variables, which override the selected config file.
usb_id=32ac:0026
usb_path=any
scsi_vendor=FRMW
scsi_model=MicroSD(2nd Gen)
scsi_revision=any
transport=usb-storage
target=/
rtc_device=/dev/rtc0
allow_model_prefix=no

# usb_path is udev's stable ID_PATH for a physical slot, not a transient node
# such as 2-4. The currently tested expansion bay reports:
# usb_path=pci-0000:00:0d.0-usb-0:4
